<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Simulador de Consumo Energético{% endblock %}</title>
    
    <!-- Google Fonts: Outfit & Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Background Animated Blobs -->
    <div class="bg-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <header class="navbar-wrapper">
        <nav class="navbar container">
            <div class="navbar-brand">
                <div class="brand-icon">
                    <i class="fas fa-bolt"></i>
                </div>
                <div class="brand-text">
                    <span class="brand-title">Simulador</span>
                    <span class="brand-subtitle">Energético</span>
                </div>
            </div>
            <ul class="navbar-menu">
                <li><a href="{{ url_for('inicio') }}" class="nav-link {% if request.path == '/' %}active{% endif %}">Inicio</a></li>
                <li><a href="{{ url_for('aparatos_page') }}" class="nav-link {% if request.path == '/aparatos' %}active{% endif %}">Aparatos</a></li>
                <li><a href="{{ url_for('analisis_page') }}" class="nav-link {% if request.path == '/analisis' %}active{% endif %}">Análisis</a></li>
                <li><a href="{{ url_for('simulacion_page') }}" class="nav-link {% if request.path == '/simulacion' %}active{% endif %}">Simulación</a></li>
                <li><a href="{{ url_for('recomendaciones_page') }}" class="nav-link {% if request.path == '/recomendaciones' %}active{% endif %}">Consejos</a></li>
            </ul>
            <div class="navbar-actions">
                <button class="btn btn-primary btn-sm" onclick="cargarEjemplo()">
                    <i class="fas fa-magic"></i> Demo
                </button>
            </div>
        </nav>
    </header>

    <!-- Notificación -->
    <div id="notification" class="notification"></div>

    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <div class="container footer-content">
            <div class="footer-info">
                <p class="footer-copy">&copy; 2025 Simulador de Consumo Energético</p>
                <p class="footer-authors">Desarrollado por el equipo de Eficiencia Energética</p>
            </div>
            <div class="footer-links">
                <a href="#" class="footer-link"><i class="fab fa-github"></i></a>
                <a href="#" class="footer-link"><i class="fas fa-book"></i></a>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
    <script src="{{ url_for('static', filename='main.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
