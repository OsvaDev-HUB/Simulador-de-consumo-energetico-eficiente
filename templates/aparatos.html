{% extends "base.html" %}

{% block content %}
<div class="container">
    <div class="card">
        <h2><i class="fas fa-plug"></i> Gestión de Dispositivos</h2>
        <p class="section-desc">Registra los aparatos eléctricos de tu hogar para calcular su consumo.</p>
        
        <div class="form-group">
            <div class="input-wrapper">
                <input type="text" id="nombre-aparato" placeholder="Nombre (Ej: Refrigerador)" class="input-field">
            </div>
            <div class="input-wrapper">
                <input type="number" id="potencia-aparato" placeholder="Potencia (Watts)" class="input-field" min="1">
            </div>
            <div class="input-wrapper">
                <input type="number" id="horas-aparato" placeholder="Uso Diario (Horas)" class="input-field" min="0.1" step="0.1">
            </div>
            <button onclick="agregarAparato()" class="btn btn-primary">
                <i class="fas fa-plus"></i> Añadir
            </button>
        </div>

        <div id="lista-aparatos" class="aparatos-list">
            <div class="empty-state">
                <i class="fas fa-microchip"></i>
                <p>Cargando dispositivos...</p>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    document.addEventListener('DOMContentLoaded', () => {
        cargarAparatos();
    });
</script>
{% endblock %}
